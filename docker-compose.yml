version: '3.8'

services:
  redis:
      image: redis:7-alpine
      ports:
        - "6379:6379"
  postgres:
      image: postgres:15-alpine
      environment:
        POSTGRES_USER: dataharvest
        POSTGRES_PASSWORD: dataharvest
        POSTGRES_DB: dataharvest
      ports:
        - "5433:5432"
      volumes: 
        - postgres-data:/var/lib/postgresql/data
  
volumes:
  postgres-data: